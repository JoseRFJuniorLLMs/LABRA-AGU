[pytest]
# Por defeito (CI), corre só os testes UNITÁRIOS em tests/ — puros, sem infra.
# Os testes de INTEGRAÇÃO ficam na raiz (test_*.py) e sobem um HeraclitusDB
# real; corra-os explicitamente quando o binário do servidor estiver presente:
#   py -m pytest test_integration.py test_daemon.py test_phase2_theory.py ...
# (ver agent/testing.py para a descoberta do binário do servidor).
testpaths = tests
markers =
    integration: requer um HeraclitusDB a correr (binário do servidor)

name: CI

on:
  push:
  pull_request:

jobs:
  unit:
    name: Testes unitários
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Instalar dependências de núcleo + testes
        run: |
          python -m pip install --upgrade pip
          pip install grpcio==1.62.1 grpcio-tools==1.62.1 pydantic==2.6.4 pytest
      - name: Testes unitários (offline, sem servidor)
        run: python -m pytest tests/ -q
